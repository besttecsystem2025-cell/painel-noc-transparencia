
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC Governo Digital</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#070f18;
color:white;
}

/* HEADER */

header{
background:#0c1824;
padding:20px 40px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 25px black;
}

.logo-area{
display:flex;
align-items:center;
gap:25px;
}

.logo-area img{
height:85px;
}

h1{
font-size:30px;
margin:0;
letter-spacing:1px;
}

/* STATUS GERAL */

.status-geral{
font-size:24px;
font-weight:bold;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
padding:40px;
}

/* CARDS */

.card{
background:#0c1824;
border-radius:14px;
padding:30px;
text-align:center;
box-shadow:0 0 20px #000;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* CORES STATUS */

.disponivel{
background:#0f5132;
box-shadow:0 0 30px #00ff9d;
}

.instavel{
background:#8a6b00;
box-shadow:0 0 30px #ffd000;
}

.indisponivel{
background:#6b0000;
box-shadow:0 0 30px red;
}

.card h2{
font-size:30px;
margin-bottom:10px;
}

.status{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

.tempo{
font-size:18px;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#0c1824;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo-area">

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

</div>

<div class="status-geral">

Disponibilidade Geral:
<span id="percentual">0%</span>

</div>

</header>

<div class="grid" id="grid"></div>

<footer>

Centro de Monitoramento Digital • Governo Digital

</footer>

<script>

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

const grid = document.getElementById("grid")

grid.innerHTML=""

document.getElementById("percentual").innerText = dados.percentual + "%"

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"

if(p.status=="INDISPONÍVEL") classe="indisponivel"

grid.innerHTML+=`

<div class="card ${classe}">

<h2>${p.nome}</h2>

<div class="status">${p.status}</div>

<div class="tempo">Tempo: ${p.tempo} ms</div>

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
