<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
overflow:hidden;
}

/* HEADER */

header{
background:#050d1a;
padding:25px;
text-align:center;
border-bottom:1px solid rgba(0,180,255,.3);
}

header img{
height:120px;
filter:drop-shadow(0 0 15px #00b4ff);
}

h1{
color:#7dd3fc;
margin:10px 0;
}

.status-geral{
font-size:18px;
color:#38bdf8;
}

/* GRID PORTAIS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

/* CARD */

.card{
background:#0b1220;
border-radius:14px;
padding:20px;
text-align:center;
border:1px solid rgba(0,180,255,.25);
box-shadow:0 0 20px rgba(0,180,255,.2);
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

/* STATUS */

.disponivel{
border-color:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.5);
}

.instavel{
border-color:#facc15;
box-shadow:0 0 20px rgba(250,204,21,.5);
}

.indisponivel{
border-color:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.8);
}

/* MAPA */

.mapa-container{
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.mapa{
position:relative;
width:650px;
}

.mapa img{
width:100%;
}

/* CIDADES */

.cidade{
position:absolute;
width:16px;
height:16px;
border-radius:50%;
}

.verde{background:#22c55e;}
.amarelo{background:#facc15;}
.vermelho{background:#ef4444;}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status-geral">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<div class="mapa-container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa_goias.png') }}">

<div id="cidadeocidental" class="cidade verde" style="top:250px;left:250px;"></div>
<div id="valparaiso" class="cidade verde" style="top:260px;left:270px;"></div>
<div id="luziania" class="cidade verde" style="top:270px;left:300px;"></div>
<div id="saojoao" class="cidade verde" style="top:200px;left:320px;"></div>
<div id="altoparaiso" class="cidade verde" style="top:130px;left:240px;"></div>
<div id="simolandia" class="cidade verde" style="top:220px;left:350px;"></div>
<div id="terezopolis" class="cidade verde" style="top:290px;left:220px;"></div>

</div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta=await fetch("/dados")
const dados=await resposta.json()

document.getElementById("percentual").innerText=dados.percentual+"%"

const grid=document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL")classe="instavel"
if(p.status=="INDISPONÍVEL")classe="indisponivel"

let nomeCompleto = nomes[p.nome] || p.nome

grid.innerHTML+=`

<div class="card ${classe}">
<h3>${nomeCompleto}</h3>
<div>${p.status}</div>
<div>${p.tempo} ms</div>
</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
