<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI,Arial;
background:#020617;
color:white;

height:100vh;
overflow:hidden;

}

/* HEADER */

header{

text-align:center;
padding:10px;

}

header img{

height:90px;
filter:drop-shadow(0 0 15px #00b4ff);

}

h1{

margin:5px 0;
color:#7dd3fc;
font-size:26px;

}

.status-geral{

color:#38bdf8;
font-size:16px;

}

/* LAYOUT */

.container{

display:grid;
grid-template-columns:1fr 1fr;

height:calc(100vh - 120px);

padding:10px;
gap:20px;

}

/* MAPA */

.mapa{

position:relative;

display:flex;
align-items:center;
justify-content:center;

}

.mapa img{

max-width:480px;
width:100%;

}

/* MARCAÇÃO DAS CIDADES */

.cidade{

position:absolute;

font-size:12px;
font-weight:bold;

padding:2px 6px;

border-radius:4px;

background:#22c55e;
color:#000;

animation:pulse 1.5s infinite;

}

/* POSIÇÕES DAS CIDADES */

#cidadeocidental{top:60%;left:34%;}
#valparaiso{top:57%;left:41%;}
#luziania{top:50%;left:56%;}
#saojoao{top:38%;left:60%;}
#altoparaiso{top:27%;left:46%;}
#simolandia{top:60%;left:70%;}
#terezopolis{top:72%;left:51%;}

/* STATUS */

.disponivel{
background:#22c55e;
}

.instavel{
background:#facc15;
}

.indisponivel{
background:#ef4444;
color:white;
}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}

}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:10px;

align-content:start;

}

.card{

background:#0b1220;

border-radius:10px;

padding:12px;

text-align:center;

border:1px solid rgba(0,180,255,.3);

box-shadow:0 0 10px rgba(0,180,255,.3);

font-size:14px;

}

/* RESPONSIVO */

@media (max-width:1100px){

.container{

grid-template-columns:1fr;

overflow:auto;

}

body{

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status-geral">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="cidadeocidental" class="cidade">CO</div>
<div id="valparaiso" class="cidade">VP</div>
<div id="luziania" class="cidade">LU</div>
<div id="saojoao" class="cidade">SJ</div>
<div id="altoparaiso" class="cidade">AP</div>
<div id="simolandia" class="cidade">SI</div>
<div id="terezopolis" class="cidade">TE</div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

const idsMapa = {

"Cidade Ocidental":"cidadeocidental",
"Valparaíso":"valparaiso",
"São João d'Aliança":"saojoao",
"Alto Paraíso":"altoparaiso",
"Luziânia":"luziania",
"Simolândia":"simolandia",
"Terezópolis":"terezopolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL")classe="instavel"
if(p.status=="INDISPONÍVEL")classe="indisponivel"

let nomeCompleto = nomes[p.nome]

grid.innerHTML+=`

<div class="card ${classe}">

<strong>${nomeCompleto}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

/* atualiza cidade no mapa */

let id = idsMapa[p.nome]

let cidade = document.getElementById(id)

cidade.classList.remove("disponivel","instavel","indisponivel")

cidade.classList.add(classe)

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
