<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
overflow:hidden;
height:100vh;

}

/* HEADER */

header{

text-align:center;
padding:10px;

}

header img{

height:90px;
filter:drop-shadow(0 0 20px #00b4ff);

}

h1{

margin:5px 0;
color:#7dd3fc;
font-size:28px;

}

.status{

color:#38bdf8;
font-size:16px;

}

/* LAYOUT */

.container{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

height:calc(100vh - 120px);
padding:10px;

}

/* MAPA */

.mapa{

position:relative;

display:flex;
justify-content:center;
align-items:flex-start;

}

.mapa img{

width:80%;
max-width:420px;

}

/* SVG overlay */

.overlay{

position:absolute;
width:80%;
max-width:420px;
pointer-events:none;

}

/* CIDADES */

.cidade{

fill:rgba(34,197,94,0.35);
stroke:#22c55e;
stroke-width:2;

animation:pulse 2s infinite;

}

/* STATUS */

.instavel{

fill:rgba(250,204,21,.35);
stroke:#facc15;

}

.indisponivel{

fill:rgba(239,68,68,.35);
stroke:#ef4444;

}

/* ANIMAÇÃO */

@keyframes pulse{

0%{opacity:.5}
50%{opacity:1}
100%{opacity:.5}

}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

align-content:start;

}

/* CARD */

.card{

background:#0b1220;

border-radius:12px;

padding:15px;

text-align:center;

border:1px solid rgba(0,180,255,.3);

box-shadow:0 0 20px rgba(0,180,255,.2);

animation:glow 4s infinite alternate;

}

@keyframes glow{

from{box-shadow:0 0 10px rgba(0,180,255,.2)}
to{box-shadow:0 0 25px rgba(0,180,255,.6)}

}

/* RESPONSIVO */

@media (max-width:1200px){

.container{

grid-template-columns:1fr;
overflow:auto;

}

body{

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<svg class="overlay" viewBox="0 0 400 400">

<!-- ALTO PARAISO -->
<polygon id="altoparaiso"
points="150,40 190,35 210,60 170,70"
class="cidade"/>

<!-- SAO JOAO -->
<polygon id="saojoao"
points="240,120 280,110 300,140 260,160"
class="cidade"/>

<!-- LUZIANIA -->
<polygon id="luziania"
points="230,200 270,190 290,220 250,240"
class="cidade"/>

<!-- CIDADE OCIDENTAL -->
<polygon id="cidadeocidental"
points="130,230 170,220 190,250 150,270"
class="cidade"/>

<!-- VALPARAISO -->
<polygon id="valparaiso"
points="180,200 210,190 220,210 190,220"
class="cidade"/>

<!-- TEREZOPOLIS -->
<polygon id="terezopolis"
points="200,260 240,250 260,280 220,300"
class="cidade"/>

<!-- SIMOLANDIA -->
<polygon id="simolandia"
points="300,240 340,230 360,260 320,280"
class="cidade"/>

</svg>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

const idsMapa = {

"Cidade Ocidental":"cidadeocidental",
"Valparaíso":"valparaiso",
"São João d'Aliança":"saojoao",
"Alto Paraíso":"altoparaiso",
"Luziânia":"luziania",
"Simolândia":"simolandia",
"Terezópolis":"terezopolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="cidade"

if(p.status=="INSTÁVEL")classe="cidade instavel"
if(p.status=="INDISPONÍVEL")classe="cidade indisponivel"

let nomeCompleto = nomes[p.nome]

grid.innerHTML+=`

<div class="card">

<strong>${nomeCompleto}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

let id = idsMapa[p.nome]

let cidade = document.getElementById(id)

cidade.setAttribute("class",classe)

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
