<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento Transparência</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
overflow:hidden;

}

/* HEADER */

header{

text-align:center;
padding:20px;

}

header img{

height:110px;
filter:drop-shadow(0 0 20px #00b4ff);

}

h1{

margin-top:10px;
color:#7dd3fc;
font-size:32px;

}

.status{

color:#38bdf8;
margin-top:6px;

}

/* LAYOUT */

.container{

display:grid;

grid-template-columns:48% 52%;

height:calc(100vh - 140px);

padding:20px;

align-items:center;

}

/* MAPA */

.mapa{

position:relative;

width:520px;
height:520px;

margin:auto;

}

.mapa img{

width:100%;
height:100%;
object-fit:contain;

}

/* RADAR */

.radar{

position:absolute;

width:40px;
height:40px;

border-radius:50%;

border:2px solid #22c55e;

animation:radar 2s linear infinite;

display:flex;
align-items:center;
justify-content:center;

}

.radar::after{

content:"";

width:6px;
height:6px;

background:#22c55e;

border-radius:50%;

box-shadow:0 0 12px #22c55e;

}

@keyframes radar{

0%{

transform:scale(.5);
opacity:1;

}

100%{

transform:scale(1.6);
opacity:0;

}

}

/* POSIÇÕES DAS CIDADES */

#altoparaiso{top:70px;left:230px;}
#saojoao{top:160px;left:290px;}
#luziania{top:260px;left:270px;}
#cidadeocidental{top:300px;left:140px;}
#valparaiso{top:260px;left:200px;}
#terezopolis{top:350px;left:230px;}
#simolandia{top:310px;left:340px;}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:15px;

padding-right:30px;

}

/* CARD */

.card{

background:#0b1220;

border-radius:10px;

padding:14px;

font-size:14px;

text-align:center;

border:1px solid rgba(0,180,255,.4);

box-shadow:0 0 10px rgba(0,180,255,.5);

animation:glow 3s infinite alternate;

transition:.3s;

}

.card:hover{

transform:scale(1.05);

box-shadow:0 0 25px #00b4ff;

}

@keyframes glow{

from{

box-shadow:0 0 10px rgba(0,180,255,.3);

}

to{

box-shadow:0 0 25px rgba(0,180,255,.9);

}

}

/* RESPONSIVO */

@media(max-width:1100px){

.container{

grid-template-columns:1fr;

height:auto;

overflow:auto;

}

body{

overflow:auto;

}

.mapa{

width:400px;
height:400px;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="radar"></div>
<div id="saojoao" class="radar"></div>
<div id="luziania" class="radar"></div>
<div id="cidadeocidental" class="radar"></div>
<div id="valparaiso" class="radar"></div>
<div id="terezopolis" class="radar"></div>
<div id="simolandia" class="radar"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<strong>${nomes[p.nome]}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
