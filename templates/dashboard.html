<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel NOC Transparência</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:Arial;
    color:#fff;
    overflow-x:hidden;
}

/* HEADER */
header{
    text-align:center;
    padding:30px 10px;
}

header h1{
    color:#38bdf8;
    font-size:28px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#0f172a;
    border-radius:12px;
    padding:20px;
    text-align:center;
    position:relative;
    transition:0.3s;
}

/* STATUS CORES */
.disponivel{
    box-shadow:0 0 15px #22c55e;
}

.lento{
    box-shadow:0 0 15px #facc15;
}

.instavel{
    box-shadow:0 0 15px #fb923c;
}

.off{
    box-shadow:0 0 15px #ef4444;
}

/* TEXTO */
.card h3{
    margin-bottom:10px;
    font-size:18px;
}

.status{
    font-size:16px;
    margin:10px 0;
}

.tempo{
    font-size:14px;
}

/* RADAR ANIMAÇÃO */
.radar{
    width:14px;
    height:14px;
    background:#22c55e;
    border-radius:50%;
    margin:0 auto 10px;
    position:relative;
}

.radar::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px solid #22c55e;
    animation:radar 1.5s infinite;
}

@keyframes radar{
    0%{transform:scale(1); opacity:1;}
    100%{transform:scale(3); opacity:0;}
}

/* RESPONSIVO */
@media(max-width:600px){
    header h1{
        font-size:20px;
    }
}
</style>
</head>

<body>

<header>
    <h1>MONITORAMENTO DOS PORTAIS</h1>
</header>

<div class="container" id="dados"></div>

<script>
function classeStatus(status){
    if(status === "DISPONÍVEL") return "disponivel";
    if(status === "LENTO") return "lento";
    if(status === "INSTÁVEL") return "instavel";
    return "off";
}

function carregar(){
    fetch('/dados')
    .then(r=>r.json())
    .then(data=>{
        let html = "";

        for(let nome in data){
            let d = data[nome];

            html += `
            <div class="card ${classeStatus(d.status)}">
                <div class="radar"></div>
                <h3>${nome}</h3>
                <div class="status">${d.status}</div>
                <div class="tempo">${d.tempo} ms</div>
            </div>`;
        }

        document.getElementById("dados").innerHTML = html;
    });
}

carregar();
setInterval(carregar, 8000);
</script>

</body>
</html>
