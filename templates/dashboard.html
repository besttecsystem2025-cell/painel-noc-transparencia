<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento Transparência</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;

overflow:hidden;

}

/* HEADER */

header{

text-align:center;
padding:20px;

}

header img{

height:90px;
filter:drop-shadow(0 0 20px #00b4ff);

}

h1{

margin-top:10px;
color:#7dd3fc;
font-size:28px;

}

.status{

color:#38bdf8;
margin-top:6px;

}

/* LAYOUT */

.container{

display:grid;

grid-template-columns:45% 55%;

height:calc(100vh - 140px);

padding:20px;

gap:10px;

align-items:center;

}

/* MAPA */

.mapa{

position:relative;

width:420px;
height:420px;

margin:auto;

}

.mapa img{

width:100%;
height:100%;
object-fit:contain;

}

/* RADAR */

.radar{

position:absolute;

width:70px;
height:70px;

border-radius:50%;

border:2px solid #22c55e;

animation:radar 2.5s linear infinite;

}

.radar::after{

content:"";

position:absolute;

width:8px;
height:8px;

background:#22c55e;

border-radius:50%;

top:50%;
left:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 12px #22c55e;

}

@keyframes radar{

0%{

transform:scale(0.3);
opacity:1;

}

100%{

transform:scale(1.8);
opacity:0;

}

}

/* POSIÇÕES */

#altoparaiso{top:40px;left:190px;}
#saojoao{top:130px;left:250px;}
#luziania{top:200px;left:240px;}
#cidadeocidental{top:220px;left:110px;}
#valparaiso{top:200px;left:160px;}
#terezopolis{top:290px;left:180px;}
#simolandia{top:250px;left:300px;}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:15px;

}

/* CARD */

.card{

background:#0b1220;

border-radius:12px;

padding:15px;

text-align:center;

border:1px solid rgba(0,180,255,.4);

box-shadow:0 0 10px rgba(0,180,255,.5);

animation:glow 3s infinite alternate;

transition:.3s;

}

.card:hover{

transform:scale(1.07);

}

@keyframes glow{

from{

box-shadow:0 0 10px rgba(0,180,255,.3);

}

to{

box-shadow:0 0 30px rgba(0,180,255,.8);

}

}

/* RESPONSIVO */

@media(max-width:1000px){

.container{

grid-template-columns:1fr;

height:auto;

overflow:auto;

}

body{

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="radar"></div>
<div id="saojoao" class="radar"></div>
<div id="luziania" class="radar"></div>
<div id="cidadeocidental" class="radar"></div>
<div id="valparaiso" class="radar"></div>
<div id="terezopolis" class="radar"></div>
<div id="simolandia" class="radar"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<strong>${nomes[p.nome]}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
