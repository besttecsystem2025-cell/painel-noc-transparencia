<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */

header{
text-align:center;
padding:20px 10px;
}

header img{
height:120px;
filter:drop-shadow(0 0 20px #00b4ff);
}

h1{
color:#7dd3fc;
margin:10px 0;
font-size:32px;
}

.status{
color:#38bdf8;
font-size:18px;
}

/* LAYOUT */

.container{

display:flex;
height:70vh;

}

/* MAPA */

.mapa-area{

flex:1;

display:flex;
align-items:center;
justify-content:center;

}

.mapa{

position:relative;
width:90%;
max-width:520px;

}

.mapa img{
width:100%;
}

/* PONTOS */

.ponto{

position:absolute;
width:14px;
height:14px;

border-radius:50%;
border:2px solid white;

animation:pulse 2s infinite;

}

.verde{background:#22c55e;}
.amarelo{background:#facc15;}
.vermelho{background:#ef4444;}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}

}

/* POSIÇÕES DAS CIDADES (RESPONSIVAS) */

#cidadeocidental{top:60%;left:35%;}
#valparaiso{top:58%;left:40%;}
#luziania{top:50%;left:55%;}
#saojoao{top:35%;left:60%;}
#altoparaiso{top:25%;left:45%;}
#simolandia{top:58%;left:70%;}
#terezopolis{top:70%;left:50%;}

/* CARDS */

.cards{

flex:1;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:15px;

align-content:center;

padding:10px;

}

.card{

background:#0b1220;
border-radius:12px;
padding:15px;
text-align:center;

border:1px solid rgba(0,180,255,.3);

box-shadow:0 0 15px rgba(0,180,255,.4);

transition:.3s;

}

.card:hover{

transform:scale(1.05);
box-shadow:0 0 25px #00b4ff;

}

/* STATUS */

.disponivel{
border-color:#22c55e;
}

.instavel{
border-color:#facc15;
}

.indisponivel{
border-color:#ef4444;
}

/* RESPONSIVO */

@media (max-width:900px){

.container{
flex-direction:column;
height:auto;
}

body{
overflow:auto;
}

header img{
height:90px;
}

h1{
font-size:26px;
}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa-area">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa_goias.png') }}">

<div id="cidadeocidental" class="ponto verde"></div>
<div id="valparaiso" class="ponto verde"></div>
<div id="luziania" class="ponto verde"></div>
<div id="saojoao" class="ponto verde"></div>
<div id="altoparaiso" class="ponto verde"></div>
<div id="simolandia" class="ponto verde"></div>
<div id="terezopolis" class="ponto verde"></div>

</div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL")classe="instavel"
if(p.status=="INDISPONÍVEL")classe="indisponivel"

let nomeCompleto = nomes[p.nome]

grid.innerHTML+=`

<div class="card ${classe}">

<strong>${nomeCompleto}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
