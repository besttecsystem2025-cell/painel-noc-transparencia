<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
background:#050d1a;
padding:25px;
text-align:center;
border-bottom:1px solid rgba(0,180,255,.3);
box-shadow:0 0 40px rgba(0,180,255,.2);
}

header img{
height:120px;
filter:drop-shadow(0 0 15px #00b4ff);
}

h1{
color:#7dd3fc;
margin-top:10px;
}

.status-geral{
font-size:20px;
color:#38bdf8;
}

/* CARDS DOS PORTAIS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:35px;
}

.card{
background:#0b1220;
border-radius:16px;
padding:25px;
text-align:center;
border:1px solid rgba(0,180,255,.25);
box-shadow:0 0 20px rgba(0,180,255,.2);
}

.disponivel{
border-color:#22c55e;
}

.instavel{
border-color:#facc15;
}

.indisponivel{
border-color:#ef4444;
}

/* AREA INFERIOR */

.dashboard-bottom{

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

padding:35px;

}

.extra-card{

background:#0b1220;

border-radius:16px;

padding:25px;

border:1px solid rgba(0,180,255,.25);

box-shadow:0 0 20px rgba(0,180,255,.2);

}

.extra-card h2{

color:#7dd3fc;

margin-bottom:15px;

}

/* RANKING */

.ranking-item{

padding:8px;

border-bottom:1px solid rgba(255,255,255,.1);

font-size:16px;

}

/* FOOTER */

footer{

text-align:center;

padding:12px;

background:#050d1a;

color:#94a3b8;

}

/* RESPONSIVO */

@media(max-width:900px){

.dashboard-bottom{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status-geral">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="grid" id="grid"></div>

<div class="dashboard-bottom">

<div class="extra-card">

<h2>Ranking de desempenho</h2>

<div id="ranking"></div>

</div>

<div class="extra-card">

<h2>Tempo médio de resposta</h2>

<canvas id="grafico"></canvas>

</div>

</div>

<footer>

Centro de Monitoramento Digital • Governo Digital

</footer>

<script>

let historicoTempo = []

let historicoHora = []

const ctx = document.getElementById("grafico")

const grafico = new Chart(ctx,{

type:"line",

data:{

labels:historicoHora,

datasets:[{

label:"Tempo médio (ms)",

data:historicoTempo,

borderColor:"#00b4ff",

backgroundColor:"rgba(0,180,255,.2)",

tension:0.4

}]

}

})

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

let soma=0

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"

if(p.status=="INDISPONÍVEL") classe="indisponivel"

soma+=p.tempo

grid.innerHTML += `

<div class="card ${classe}">

<h2>${p.nome}</h2>

<div>${p.status}</div>

<div>Tempo: ${p.tempo} ms</div>

</div>

`

})

/* RANKING */

const ranking = document.getElementById("ranking")

const ordenado=[...dados.portais].sort((a,b)=>a.tempo-b.tempo)

ranking.innerHTML=""

ordenado.forEach((p,i)=>{

ranking.innerHTML += `

<div class="ranking-item">

${i+1}º — ${p.nome} : ${p.tempo} ms

</div>

`

})

/* GRAFICO */

let media=Math.round(soma/dados.portais.length)

historicoTempo.push(media)

historicoHora.push(new Date().toLocaleTimeString())

if(historicoTempo.length>20){

historicoTempo.shift()

historicoHora.shift()

}

grafico.update()

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
