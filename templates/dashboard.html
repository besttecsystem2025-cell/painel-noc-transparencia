<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI,Arial;
background:#020617;
color:white;

height:100vh;

}

/* HEADER */

header{

text-align:center;
padding:20px 10px;

}

header img{

height:110px;
filter:drop-shadow(0 0 20px #00b4ff);

}

h1{

margin:10px 0;
color:#7dd3fc;
font-size:30px;

}

.status-geral{

color:#38bdf8;
font-size:18px;

}

/* LAYOUT PRINCIPAL */

.container{

display:grid;

grid-template-columns: 1fr 1fr;

gap:30px;

padding:20px;

height:calc(100vh - 180px);

}

/* MAPA */

.mapa{

position:relative;

display:flex;
align-items:center;
justify-content:center;

}

.mapa img{

width:100%;
max-width:550px;

}

/* BOLINHAS */

.ponto{

position:absolute;

width:14px;
height:14px;

border-radius:50%;

border:2px solid white;

background:#22c55e;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}

}

/* POSIÇÕES DAS CIDADES */

#cidadeocidental{top:60%;left:33%;}
#valparaiso{top:58%;left:40%;}
#luziania{top:50%;left:55%;}
#saojoao{top:38%;left:60%;}
#altoparaiso{top:28%;left:45%;}
#simolandia{top:60%;left:70%;}
#terezopolis{top:72%;left:50%;}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:20px;

align-content:start;

}

.card{

background:#0b1220;

border-radius:14px;

padding:18px;

text-align:center;

border:1px solid rgba(0,180,255,.3);

box-shadow:0 0 20px rgba(0,180,255,.25);

transition:.3s;

}

.card:hover{

transform:scale(1.05);

box-shadow:0 0 35px #00b4ff;

}

.disponivel{

border-color:#22c55e;

}

.instavel{

border-color:#facc15;

}

.indisponivel{

border-color:#ef4444;

}

/* RESPONSIVO */

@media (max-width:1200px){

.container{

grid-template-columns:1fr;

height:auto;

}

.mapa img{

max-width:450px;

}

}

@media (max-width:700px){

header img{

height:80px;

}

h1{

font-size:22px;

}

.cards{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status-geral">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="cidadeocidental" class="ponto"></div>
<div id="valparaiso" class="ponto"></div>
<div id="luziania" class="ponto"></div>
<div id="saojoao" class="ponto"></div>
<div id="altoparaiso" class="ponto"></div>
<div id="simolandia" class="ponto"></div>
<div id="terezopolis" class="ponto"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL")classe="instavel"

if(p.status=="INDISPONÍVEL")classe="indisponivel"

let nomeCompleto = nomes[p.nome]

grid.innerHTML+=`

<div class="card ${classe}">

<strong>${nomeCompleto}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
