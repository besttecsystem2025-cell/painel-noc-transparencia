<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px 10px;
}

header img{
height:70px;
filter:drop-shadow(0 0 10px #00b4ff);
}

h1{
margin-top:10px;
font-size:28px;
color:#7dd3fc;
}

.status{
margin-top:5px;
color:#38bdf8;
}

/* LAYOUT */

.container{

display:grid;
grid-template-columns:420px 1fr;
gap:40px;
max-width:1300px;
margin:auto;
padding:20px;

}

/* MAPA */

.mapa{

width:100%;
max-width:420px;
margin:auto;

}

.mapa img{

width:100%;
height:auto;

}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

/* CARD */

.card{

background:#0b1220;
border-radius:12px;
padding:20px;
text-align:center;
border:1px solid rgba(0,180,255,.4);
box-shadow:0 0 12px rgba(0,180,255,.5);
transition:.3s;

display:flex;
flex-direction:column;
align-items:center;
gap:10px;

}

.card:hover{

transform:scale(1.03);
box-shadow:0 0 20px #00b4ff;

}

/* RADAR */

.radar{

width:12px;
height:12px;
background:#22c55e;
border-radius:50%;
position:relative;

}

.radar::after{

content:'';
position:absolute;
width:20px;
height:20px;
border-radius:50%;
border:2px solid #22c55e;
top:-4px;
left:-4px;
animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(.5);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

.card strong{
font-size:15px;
}

/* RESPONSIVO */

@media(max-width:1000px){

.container{
grid-template-columns:1fr;
text-align:center;
}

.mapa{
max-width:350px;
}

}

@media(max-width:600px){

h1{
font-size:22px;
}

.mapa{
max-width:280px;
}

.cards{
grid-template-columns:1fr;
}

}

</style>

</head>


<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">100%</span>
</div>

</header>


<div class="container">

<!-- MAPA -->

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

</div>


<!-- CARDS -->

<div class="cards" id="grid"></div>

</div>


<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}


async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<div class="radar"></div>

<strong>${nomes[p.nome]}</strong>

${p.status}

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>


</body>

</html>
