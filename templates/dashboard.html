<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento Transparência</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;

overflow:hidden;

}

/* HEADER */

header{

text-align:center;
padding:20px;

}

header img{

height:95px;
filter:drop-shadow(0 0 18px #00b4ff);

}

h1{

margin-top:10px;
color:#7dd3fc;
font-size:30px;

}

.status{

color:#38bdf8;
margin-top:5px;

}

/* LAYOUT */

.container{

display:grid;

grid-template-columns:40% 60%;

height:calc(100vh - 140px);

padding:20px;

gap:25px;

align-items:center;

}

/* MAPA */

.mapa{

position:relative;

width:420px;
height:420px;

margin:auto;

}

.mapa img{

width:100%;
height:100%;
object-fit:contain;

}

/* BOLINHAS */

.ponto{

position:absolute;

width:14px;
height:14px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 14px #22c55e;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1);opacity:.6}
50%{transform:scale(1.8);opacity:1}
100%{transform:scale(1);opacity:.6}

}

/* POSIÇÃO DAS CIDADES */

#altoparaiso{top:70px;left:200px;}
#saojoao{top:150px;left:260px;}
#luziania{top:210px;left:250px;}
#cidadeocidental{top:240px;left:120px;}
#valparaiso{top:210px;left:170px;}
#terezopolis{top:300px;left:190px;}
#simolandia{top:260px;left:320px;}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:15px;

}

/* CARD */

.card{

background:#0b1220;

border-radius:12px;

padding:15px;

text-align:center;

border:1px solid rgba(0,180,255,.4);

box-shadow:0 0 12px rgba(0,180,255,.5);

animation:glow 3s infinite alternate;

}

.card:hover{

transform:scale(1.06);

}

@keyframes glow{

from{box-shadow:0 0 10px rgba(0,180,255,.3)}
to{box-shadow:0 0 25px rgba(0,180,255,.8)}

}

/* RESPONSIVO */

@media(max-width:1000px){

.container{

grid-template-columns:1fr;

height:auto;

overflow:auto;

}

body{

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="ponto"></div>
<div id="saojoao" class="ponto"></div>
<div id="luziania" class="ponto"></div>
<div id="cidadeocidental" class="ponto"></div>
<div id="valparaiso" class="ponto"></div>
<div id="terezopolis" class="ponto"></div>
<div id="simolandia" class="ponto"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<strong>${nomes[p.nome]}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
