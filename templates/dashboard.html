<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#020617;
color:white;
overflow:hidden;
}

/* HEADER */

header{

text-align:center;
padding:20px;

}

header img{
height:80px;
filter:drop-shadow(0 0 10px #00b4ff);
}

h1{
color:#7dd3fc;
margin:10px 0;
font-size:28px;
}

.status-geral{
color:#38bdf8;
font-size:18px;
}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;

padding:10px 30px;

}

.card{

background:#0b1220;

border-radius:10px;

padding:12px;

text-align:center;

font-size:14px;

border:1px solid rgba(0,180,255,.2);

box-shadow:0 0 10px rgba(0,180,255,.2);

transition:.3s;

}

.card:hover{

transform:scale(1.05);

}

/* STATUS */

.disponivel{
border-color:#22c55e;
box-shadow:0 0 15px rgba(34,197,94,.6);
}

.instavel{
border-color:#facc15;
box-shadow:0 0 15px rgba(250,204,21,.6);
}

.indisponivel{
border-color:#ef4444;
box-shadow:0 0 15px rgba(239,68,68,.8);
}

/* MAPA */

.mapa-area{

display:flex;

justify-content:center;

align-items:center;

height:55vh;

}

.mapa{

position:relative;

width:600px;

}

.mapa img{

width:100%;

}

/* PONTOS */

.ponto{

position:absolute;

width:14px;

height:14px;

border-radius:50%;

border:2px solid white;

}

.verde{background:#22c55e;}
.amarelo{background:#facc15;}
.vermelho{background:#ef4444;}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status-geral">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="cards" id="grid"></div>

<div class="mapa-area">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa_goias.png') }}">

<div id="cidadeocidental" class="ponto verde" style="top:250px;left:200px;"></div>

<div id="valparaiso" class="ponto verde" style="top:260px;left:240px;"></div>

<div id="luziania" class="ponto verde" style="top:280px;left:280px;"></div>

<div id="saojoao" class="ponto verde" style="top:200px;left:300px;"></div>

<div id="altoparaiso" class="ponto verde" style="top:120px;left:250px;"></div>

<div id="simolandia" class="ponto verde" style="top:260px;left:340px;"></div>

<div id="terezopolis" class="ponto verde" style="top:300px;left:220px;"></div>

</div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

const mapaIds = {

"Cidade Ocidental":"cidadeocidental",
"Valparaíso":"valparaiso",
"Luziânia":"luziania",
"São João d'Aliança":"saojoao",
"Alto Paraíso":"altoparaiso",
"Simolândia":"simolandia",
"Terezópolis":"terezopolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML = ""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL")classe="instavel"

if(p.status=="INDISPONÍVEL")classe="indisponivel"

let nomeCompleto = nomes[p.nome] || p.nome

grid.innerHTML+=`

<div class="card ${classe}">

<strong>${nomeCompleto}</strong>

<br>

${p.status}

<br>

${p.tempo} ms

</div>

`

let id = mapaIds[p.nome]

if(id){

let ponto = document.getElementById(id)

ponto.classList.remove("verde","amarelo","vermelho")

if(p.status=="DISPONÍVEL")ponto.classList.add("verde")

if(p.status=="INSTÁVEL")ponto.classList.add("amarelo")

if(p.status=="INDISPONÍVEL")ponto.classList.add("vermelho")

}

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
