<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento Transparência</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:Segoe UI;
background:#020617;
color:white;
overflow:hidden;

}

/* HEADER */

header{

text-align:center;
padding:20px;

}

header img{

height:110px;
filter:drop-shadow(0 0 25px #00b4ff);

}

h1{

margin-top:10px;
font-size:32px;
color:#7dd3fc;

}

.status{

color:#38bdf8;
margin-top:5px;

}

/* LAYOUT */

.container{

display:grid;
grid-template-columns:1fr 1fr;
height:calc(100vh - 150px);
padding:20px;
gap:30px;

}

/* MAPA */

.mapa{

position:relative;
display:flex;
justify-content:center;
align-items:center;

}

.mapa img{

width:100%;
max-width:520px;

}

/* BOLINHAS */

.ponto{

position:absolute;
width:16px;
height:16px;
border-radius:50%;

background:#22c55e;
box-shadow:0 0 15px #22c55e;

animation:pulse 1.2s infinite;

}

@keyframes pulse{

0%{transform:scale(1);opacity:.6}
50%{transform:scale(1.7);opacity:1}
100%{transform:scale(1);opacity:.6}

}

/* POSIÇÃO CIDADES */

#altoparaiso{top:20%;left:48%;}
#saojoao{top:35%;left:60%;}
#luziania{top:50%;left:57%;}
#cidadeocidental{top:55%;left:32%;}
#valparaiso{top:48%;left:40%;}
#terezopolis{top:68%;left:45%;}
#simolandia{top:62%;left:72%;}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

/* CARD */

.card{

background:#0b1220;
border-radius:14px;
padding:20px;
text-align:center;

border:1px solid rgba(0,180,255,.3);

box-shadow:0 0 15px rgba(0,180,255,.4);

transition:.4s;

animation:cardPulse 4s infinite alternate;

}

.card:hover{

transform:scale(1.06);
box-shadow:0 0 35px #00b4ff;

}

@keyframes cardPulse{

from{box-shadow:0 0 10px rgba(0,180,255,.3)}
to{box-shadow:0 0 30px rgba(0,180,255,.7)}

}

/* RESPONSIVO */

@media(max-width:1100px){

.container{

grid-template-columns:1fr;
overflow:auto;

}

body{

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="ponto"></div>
<div id="saojoao" class="ponto"></div>
<div id="luziania" class="ponto"></div>
<div id="cidadeocidental" class="ponto"></div>
<div id="valparaiso" class="ponto"></div>
<div id="terezopolis" class="ponto"></div>
<div id="simolandia" class="ponto"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let nomeCompleto = nomes[p.nome]

grid.innerHTML+=`

<div class="card">

<strong>${nomeCompleto}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
