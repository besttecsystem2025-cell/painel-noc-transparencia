<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoramento Transparência</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
overflow:hidden;
}

/* HEADER */

header{
text-align:center;
padding:20px;
}

header img{
height:120px;
filter:drop-shadow(0 0 20px #00b4ff);
}

h1{
margin-top:10px;
color:#7dd3fc;
font-size:34px;
}

.status{
color:#38bdf8;
margin-top:6px;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:42% 58%;
height:calc(100vh - 150px);
padding:10px 40px;
align-items:center;
}

/* MAPA */

.mapa{
position:relative;
width:560px;
height:560px;
margin:auto;

/* impede radar de aparecer fora */
overflow:hidden;
}

.mapa img{
width:100%;
height:100%;
object-fit:contain;
}

/* RADAR */

.radar{

position:absolute;

width:6px;
height:6px;

background:#22c55e;

border-radius:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 6px #22c55e;

}

.radar::before{

content:"";

position:absolute;

top:50%;
left:50%;

width:6px;
height:6px;

border:1px solid #22c55e;

border-radius:50%;

transform:translate(-50%,-50%);

animation:radar 2.2s infinite;

}

@keyframes radar{

0%{
width:6px;
height:6px;
opacity:1;
}

100%{
width:28px;
height:28px;
opacity:0;
}

}

/* POSIÇÃO DAS CIDADES */

#altoparaiso{top:145px;left:300px;}
#saojoao{top:215px;left:340px;}
#luziania{top:315px;left:300px;}
#cidadeocidental{top:335px;left:170px;}
#valparaiso{top:295px;left:240px;}
#terezopolis{top:395px;left:260px;}
#simolandia{top:355px;left:420px;}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.card{
background:#0b1220;
border-radius:12px;
padding:16px;
font-size:15px;
text-align:center;
border:1px solid rgba(0,180,255,.4);
box-shadow:0 0 15px rgba(0,180,255,.5);
transition:.3s;
}

.card:hover{
transform:scale(1.06);
box-shadow:0 0 30px #00b4ff;
}

/* RESPONSIVO */

@media(max-width:1200px){

.container{
grid-template-columns:1fr;
height:auto;
overflow:auto;
}

body{
overflow:auto;
}

.mapa{
width:420px;
height:420px;
}

.cards{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="radar"></div>
<div id="saojoao" class="radar"></div>
<div id="luziania" class="radar"></div>
<div id="cidadeocidental" class="radar"></div>
<div id="valparaiso" class="radar"></div>
<div id="terezopolis" class="radar"></div>
<div id="simolandia" class="radar"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")
const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<strong>${nomes[p.nome]}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()
setInterval(carregar,30000)

</script>

</body>

</html>
