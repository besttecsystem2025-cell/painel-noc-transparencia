<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel NOC Transparência</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b1d2c;
color:white;
}

header{
background:#102c44;
padding:15px 25px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 15px #000;
}

.logo-area{
display:flex;
align-items:center;
gap:20px;
}

.logo-area img{
height:60px;
}

h1{
font-size:26px;
margin:0;
}

.status-geral{
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#102c44;
border-radius:12px;
padding:25px;
text-align:center;
box-shadow:0 0 15px #000;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card h2{
font-size:28px;
margin-bottom:10px;
}

.disponivel{
background:#0f5132;
box-shadow:0 0 20px #00ff95;
}

.instavel{
background:#7a5d00;
box-shadow:0 0 20px #ffd500;
}

.indisponivel{
background:#5a0000;
box-shadow:0 0 20px red;
}

.status{
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.tempo{
font-size:18px;
}

footer{
text-align:center;
padding:10px;
background:#102c44;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo-area">

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

</div>

<div class="status-geral">
Disponibilidade Geral:
<span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<footer>
Centro de Monitoramento Digital • Governo Digital
</footer>

<script>

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

const grid = document.getElementById("grid")

grid.innerHTML=""

document.getElementById("percentual").innerText = dados.percentual + "%"

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"

if(p.status=="INDISPONÍVEL") classe="indisponivel"

grid.innerHTML+=`

<div class="card ${classe}">

<h2>${p.nome}</h2>

<div class="status">${p.status}</div>

<div class="tempo">Tempo: ${p.tempo} ms</div>

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
