<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC – Monitoramento de Portais de Transparência</title>

<style>
:root{
  --bg-1:#020617;
  --bg-2:#0f172a;
  --card:#0b1220;
  --blue:#00b4ff;
  --blue-soft:rgba(0,180,255,.35);
  --green:#22c55e;
  --yellow:#facc15;
  --red:#ef4444;
  --text:#e5f3ff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  color:var(--text);
  background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 28px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(2,6,23,.7);
  backdrop-filter: blur(6px);
}
.title{
  font-size:22px;
  letter-spacing:.5px;
  color:#9fdcff;
}
.metrics{
  display:flex;
  gap:20px;
  font-size:14px;
  opacity:.9;
}
.metrics b{color:#fff}

/* GRID */
.grid{
  padding:24px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:14px;
  padding:20px;
  border:1px solid rgba(0,180,255,.2);
  box-shadow:0 0 20px rgba(0,180,255,.12);
  transition:.25s;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 0 28px var(--blue-soft);
}
.card h3{
  margin:0 0 8px 0;
  font-weight:600;
}
.status{
  font-size:14px;
  margin-bottom:6px;
}
.time{
  font-size:12px;
  opacity:.7;
}

/* STATUS COLORS */
.ok{
  border-color:rgba(34,197,94,.35);
  box-shadow:0 0 16px rgba(34,197,94,.35);
}
.warn{
  border-color:rgba(250,204,21,.35);
  box-shadow:0 0 16px rgba(250,204,21,.35);
}
.off{
  border-color:rgba(239,68,68,.45);
  box-shadow:0 0 16px rgba(239,68,68,.45);
  animation:pulse 1.5s infinite;
}

/* FOOTER */
footer{
  text-align:center;
  padding:10px;
  font-size:12px;
  opacity:.6;
}

/* ALERT ANIMATION */
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}

/* RESPONSIVE */
@media(max-width:700px){
  header{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }
}
</style>
</head>

<body>

<header>
<div class="title">
🛰️ Monitoramento de Portais de Transparência
</div>

<div class="metrics">
<div>Total: <b id="total">0</b></div>
<div>Online: <b id="online">0</b></div>
<div>Offline: <b id="offline">0</b></div>
<div>Disponibilidade: <b id="percentual">0%</b></div>
</div>
</header>

<div class="grid" id="grid"></div>

<footer>
Atualizado em <span id="atualizado"></span>
</footer>

<script>
let alertaTocado=false

async function atualizar(){

const res=await fetch("/dados")
const dados=await res.json()

document.getElementById("percentual").innerText=dados.percentual+"%"
document.getElementById("total").innerText=dados.total
document.getElementById("online").innerText=dados.online
document.getElementById("offline").innerText=dados.offline
document.getElementById("atualizado").innerText=dados.atualizado

const grid=document.getElementById("grid")
grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="ok"
if(p.status==="INSTÁVEL")classe="warn"
if(p.status==="INDISPONÍVEL")classe="off"

if(p.status==="INDISPONÍVEL" && !alertaTocado){
tocarAlerta()
alertaTocado=true
}

const card=document.createElement("div")
card.className="card "+classe

card.innerHTML=`
<h3>${p.nome}</h3>
<div class="status">${p.status}</div>
<div class="time">Tempo de resposta: ${p.tempo} ms</div>
`

grid.appendChild(card)

})

}

function tocarAlerta(){
const audio=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3")
audio.play()
}

setInterval(atualizar,30000)
atualizar()
</script>

</body>
</html>
