<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento dos Portais</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px 0;
}

header img{
height:80px;
filter:drop-shadow(0 0 15px #00b4ff);
}

h1{
margin-top:10px;
font-size:30px;
color:#7dd3fc;
}

.status{
margin-top:6px;
color:#38bdf8;
}

/* LAYOUT PRINCIPAL */

.main{

display:flex;
justify-content:center;
align-items:center;
gap:40px;
height:calc(100vh - 180px);

}

/* MAPA */

.mapa-container{

position:relative;
width:420px;

}

.mapa-container img{

width:100%;
height:auto;

}

/* RADAR */

.radar{

position:absolute;
width:14px;
height:14px;
background:#22c55e;
border-radius:50%;
transform:translate(-50%,-50%);

}

.radar::after{

content:'';
position:absolute;
width:40px;
height:40px;
border-radius:50%;
border:2px solid #22c55e;
top:-13px;
left:-13px;
animation:radar 2s linear infinite;

}

@keyframes radar{

0%{
transform:scale(0.5);
opacity:1;
}

100%{
transform:scale(1.6);
opacity:0;
}

}

/* POSIÇÃO DAS CIDADES */

#altoparaiso{top:27%;left:53%;}
#saojoao{top:41%;left:60%;}
#luziania{top:55%;left:50%;}
#cidadeocidental{top:60%;left:30%;}
#valparaiso{top:52%;left:40%;}
#terezopolis{top:72%;left:46%;}
#simolandia{top:66%;left:73%;}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(3,220px);
gap:18px;

}

.card{

background:#0b1220;
border-radius:10px;
padding:16px;
text-align:center;
border:1px solid rgba(0,180,255,.4);
box-shadow:0 0 12px rgba(0,180,255,.5);
transition:.3s;

}

.card:hover{

transform:scale(1.05);
box-shadow:0 0 25px #00b4ff;

}

.card strong{

font-size:14px;

}

/* RESPONSIVO */

@media(max-width:1200px){

.main{
flex-direction:column;
}

.cards{
grid-template-columns:repeat(2,220px);
}

}

@media(max-width:700px){

.cards{
grid-template-columns:1fr;
}

.mapa-container{
width:300px;
}

}

</style>

</head>


<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">100%</span>

</div>

</header>


<div class="main">

<!-- MAPA -->

<div class="mapa-container">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="radar"></div>
<div id="saojoao" class="radar"></div>
<div id="luziania" class="radar"></div>
<div id="cidadeocidental" class="radar"></div>
<div id="valparaiso" class="radar"></div>
<div id="terezopolis" class="radar"></div>
<div id="simolandia" class="radar"></div>

</div>


<!-- CARDS -->

<div class="cards" id="grid"></div>

</div>


<script>

/* FULLSCREEN AUTOMÁTICO */

document.addEventListener("DOMContentLoaded", () => {

if (document.documentElement.requestFullscreen) {

document.documentElement.requestFullscreen()

}

})

/* NOMES */

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

/* CARREGAR DADOS */

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<strong>${nomes[p.nome]}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>


</body>

</html>
