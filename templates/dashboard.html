<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC Governo Digital</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
background:#060f1f;
padding:20px 40px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(0,180,255,.2);
box-shadow:0 0 25px rgba(0,180,255,.15);
}

.logo-area{
display:flex;
align-items:center;
gap:25px;
}

.logo-area img{
height:110px;
}

h1{
font-size:28px;
margin:0;
color:#7dd3fc;
letter-spacing:1px;
}

/* STATUS */

.status-geral{
font-size:24px;
color:#38bdf8;
font-weight:bold;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:40px;
}

/* CARDS */

.card{
background:#0b1220;
border-radius:14px;
padding:30px;
text-align:center;
border:1px solid rgba(0,180,255,.25);
box-shadow:0 0 25px rgba(0,180,255,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 0 30px rgba(0,180,255,.4);
}

.card h2{
font-size:28px;
margin-bottom:10px;
}

/* STATUS COLORS */

.disponivel{
border-color:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.4);
}

.instavel{
border-color:#facc15;
box-shadow:0 0 20px rgba(250,204,21,.4);
}

.indisponivel{
border-color:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.6);
animation:pulse 1.6s infinite;
}

.status{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.tempo{
font-size:18px;
opacity:.8;
}

/* FOOTER */

footer{
text-align:center;
padding:14px;
background:#060f1f;
font-size:14px;
color:#94a3b8;
}

/* ALERTA */

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.02)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<header>

<div class="logo-area">

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

</div>

<div class="status-geral">
Disponibilidade Geral:
<span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<footer>
Centro de Monitoramento Digital • Governo Digital
</footer>

<script>

async function carregar(){

const resposta = await fetch("/dados")
const dados = await resposta.json()

const grid = document.getElementById("grid")
grid.innerHTML=""

document.getElementById("percentual").innerText = dados.percentual + "%"

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"
if(p.status=="INDISPONÍVEL") classe="indisponivel"

grid.innerHTML+=`

<div class="card ${classe}">

<h2>${p.nome}</h2>

<div class="status">${p.status}</div>

<div class="tempo">Tempo: ${p.tempo} ms</div>

</div>

`

})

}

carregar()
setInterval(carregar,30000)

</script>

</body>
</html>
