
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
background:#030712;
padding:20px;
border-bottom:1px solid #00b4ff;
box-shadow:0 0 30px rgba(0,180,255,.25);
}

/* TOPO */

.topo{
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* LOGO */

.logo{
position:absolute;
left:20px;
}

.logo img{
height:120px;
filter: drop-shadow(0 0 20px #00b4ff);
}

/* TITULO */

h1{
font-size:30px;
margin:0;
color:#00d4ff;
letter-spacing:1px;
text-shadow:0 0 15px rgba(0,212,255,.6);
text-align:center;
}

/* STATUS GERAL */

.status-geral{
margin-top:10px;
text-align:center;
font-size:24px;
color:#38bdf8;
font-weight:bold;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:35px;
}

/* CARDS */

.card{
background:#0b1220;
border-radius:16px;
padding:28px;
text-align:center;
border:1px solid rgba(0,180,255,.35);
box-shadow:0 0 18px rgba(0,180,255,.25);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 35px rgba(0,180,255,.5);
}

.card h2{
font-size:26px;
margin-bottom:10px;
}

/* STATUS */

.disponivel{
border-color:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.5);
}

.instavel{
border-color:#facc15;
box-shadow:0 0 20px rgba(250,204,21,.5);
}

.indisponivel{
border-color:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.7);
animation:pulse 1.6s infinite;
}

.status{
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.tempo{
font-size:16px;
opacity:.85;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#030712;
font-size:14px;
color:#94a3b8;
}

/* ALERTA */

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.04)}
100%{transform:scale(1)}
}

/* RESPONSIVO */

@media (max-width:900px){

.logo{
position:static;
text-align:center;
margin-bottom:10px;
}

.logo img{
height:95px;
}

.topo{
flex-direction:column;
}

h1{
font-size:24px;
}

.status-geral{
font-size:20px;
}

}

</style>

</head>

<body>

<header>

<div class="topo">

<div class="logo">
<img src="{{ url_for('static', filename='Governo Digital.png') }}">
</div>

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

</div>

<div class="status-geral">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<footer>
Centro de Monitoramento Digital • Governo Digital
</footer>

<script>

async function carregar(){

const resposta = await fetch("/dados")
const dados = await resposta.json()

const grid = document.getElementById("grid")

grid.innerHTML=""

document.getElementById("percentual").innerText = dados.percentual + "%"

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"
if(p.status=="INDISPONÍVEL") classe="indisponivel"

grid.innerHTML+=`

<div class="card ${classe}">
<h2>${p.nome}</h2>
<div class="status">${p.status}</div>
<div class="tempo">Tempo: ${p.tempo} ms</div>
</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
