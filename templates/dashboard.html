<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento NOC</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 🔥 REMOVE QUALQUER SCROLL LATERAL */
html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #001a2b, #000814);
    color: white;
}

/* LOGO */
.logo {
    text-align: center;
    margin-top: 20px;
}

.logo img {
    width: 80px;
}

/* TÍTULO */
h1 {
    text-align: center;
    margin-top: 10px;
    color: #4fd1ff;
    font-size: clamp(18px, 3vw, 36px);
}

/* CONTAINER PRINCIPAL */
.container {
    width: 95%;
    margin: 30px auto;
}

/* GRID RESPONSIVO */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #021524;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    border: 1px solid #0ff;
}

/* STATUS CORES */
.ok {
    box-shadow: 0 0 20px #00ff88;
}

.lento {
    box-shadow: 0 0 20px #ffaa00;
}

.instavel {
    box-shadow: 0 0 20px #ff4444;
}

/* TEXTO */
.nome {
    font-size: 18px;
    margin-bottom: 10px;
}

.status {
    font-size: 16px;
}

.tempo {
    margin-top: 5px;
    font-size: 14px;
    color: #aaa;
}

/* RESPONSIVO EXTRA */
@media (max-width: 600px) {
    .card {
        padding: 15px;
    }
}
</style>
</head>

<body>

<div class="logo">
    <!-- 🔥 LOGO GOVERNO DIGITAL -->
    <img src="https://i.imgur.com/6X4KZ8F.png" alt="Governo Digital">
</div>

<h1>MONITORAMENTO DOS PORTAIS</h1>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<script>
async function carregar() {
    const res = await fetch("/dados");
    const dados = await res.json();

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (let nome in dados) {
        let item = dados[nome];

        let classe = "ok";
        if (item.status === "LENTO") classe = "lento";
        if (item.status === "INSTÁVEL") classe = "instavel";

        grid.innerHTML += `
            <div class="card ${classe}">
                <div class="nome">${nome}</div>
                <div class="status">${item.status}</div>
                <div class="tempo">${item.tempo} ms</div>
            </div>
        `;
    }
}

setInterval(carregar, 5000);
carregar();
</script>

</body>
</html>
