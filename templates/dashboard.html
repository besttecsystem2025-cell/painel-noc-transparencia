<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* TELA TRAVADA */

html,body{
width:100vw;
height:100vh;
overflow:hidden;
background:#020617;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:10px;
}

header img{
height:55px;
filter:drop-shadow(0 0 10px #00bfff);
}

h1{
font-size:26px;
color:#7dd3fc;
margin-top:5px;
}

.status{
color:#38bdf8;
font-size:16px;
}

/* LAYOUT */

.container{

width:100%;
height:calc(100vh - 100px);

display:flex;

justify-content:center;
align-items:center;

gap:40px;

padding:20px;

}

/* MAPA */

.mapa{

width:420px;
position:relative;

}

.mapa img{

width:100%;

}

/* SCAN DO MAPA */

.scan{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
to bottom,
transparent,
rgba(0,255,200,0.2),
transparent
);

animation:scan 4s linear infinite;

}

@keyframes scan{

0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}

}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(3,260px);

gap:25px;

}

/* CARD */

.card{

background:#0b1220;

border-radius:12px;

padding:20px;

text-align:center;

border:1px solid rgba(0,180,255,.4);

box-shadow:0 0 15px rgba(0,180,255,.4);

display:flex;

flex-direction:column;

align-items:center;

gap:10px;

transition:.3s;

}

.card:hover{

transform:scale(1.05);

box-shadow:0 0 25px #00b4ff;

}

/* RADAR */

.radar{

width:14px;
height:14px;

background:#22c55e;

border-radius:50%;

position:relative;

}

.radar::after{

content:'';

position:absolute;

width:30px;
height:30px;

border-radius:50%;

border:2px solid #22c55e;

top:-8px;
left:-8px;

animation:radar 2s infinite;

}

@keyframes radar{

0%{
transform:scale(.5);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

.card strong{
font-size:16px;
}

.card span{
font-size:18px;
}

/* RESPONSIVO */

@media(max-width:1100px){

.container{

flex-direction:column;

}

.cards{

grid-template-columns:repeat(2,260px);

}

.mapa{

width:320px;

}

}

@media(max-width:600px){

.cards{

grid-template-columns:1fr;

width:90%;

}

.mapa{

width:260px;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">100%</span>
</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div class="scan"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<div class="radar"></div>

<strong>${nomes[p.nome]}</strong>

<span>${p.status}</span>

<span>${p.tempo} ms</span>

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
