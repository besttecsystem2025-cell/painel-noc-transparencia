<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

header{
text-align:center;
padding-top:15px;
}

header img{
height:70px;
filter:drop-shadow(0 0 12px #00b4ff);
}

h1{
margin-top:8px;
font-size:28px;
color:#7dd3fc;
}

.status{
color:#38bdf8;
margin-top:6px;
}

/* LAYOUT */

.main{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
height:calc(100vh - 150px);
}

/* MAPA */

.mapa-container{
position:relative;
width:420px;
overflow:hidden;
}

.mapa-container img{
width:100%;
}

/* RADAR */

.radar{
position:absolute;
width:10px;
height:10px;
background:#22c55e;
border-radius:50%;
transform:translate(-50%,-50%);
}

.radar::after{
content:'';
position:absolute;
width:22px;
height:22px;
border-radius:50%;
border:2px solid #22c55e;
top:-6px;
left:-6px;
animation:radar 2s infinite;
}

@keyframes radar{

0%{
transform:scale(.5);
opacity:1;
}

100%{
transform:scale(1.6);
opacity:0;
}

}

/* POSIÇÃO DAS CIDADES */

#altoparaiso{top:27%;left:52%;}
#saojoao{top:41%;left:60%;}
#luziania{top:55%;left:50%;}
#cidadeocidental{top:60%;left:30%;}
#valparaiso{top:52%;left:40%;}
#terezopolis{top:72%;left:46%;}
#simolandia{top:66%;left:72%;}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,200px);
gap:16px;
}

.card{
background:#0b1220;
border-radius:10px;
padding:14px;
text-align:center;
border:1px solid rgba(0,180,255,.4);
box-shadow:0 0 10px rgba(0,180,255,.5);
}

.card strong{
font-size:14px;
}

.card:hover{
box-shadow:0 0 20px #00b4ff;
}

/* RESPONSIVO */

@media(max-width:1200px){

.main{
flex-direction:column;
}

.cards{
grid-template-columns:repeat(2,200px);
}

}

@media(max-width:700px){

.cards{
grid-template-columns:1fr;
}

.mapa-container{
width:280px;
}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">100%</span>
</div>

</header>


<div class="main">

<!-- MAPA -->

<div class="mapa-container">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="altoparaiso" class="radar"></div>
<div id="saojoao" class="radar"></div>
<div id="luziania" class="radar"></div>
<div id="cidadeocidental" class="radar"></div>
<div id="valparaiso" class="radar"></div>
<div id="terezopolis" class="radar"></div>
<div id="simolandia" class="radar"></div>

</div>


<!-- CARDS -->

<div class="cards" id="grid"></div>

</div>


<script>

/* FULLSCREEN AUTOMÁTICO */

document.addEventListener("DOMContentLoaded",()=>{

if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen()
}

})


const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}


async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText=dados.percentual+"%"

const grid=document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<strong>${nomes[p.nome]}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
