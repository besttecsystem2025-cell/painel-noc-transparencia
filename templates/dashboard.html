<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
background:#050d1a;
padding:30px 20px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
border-bottom:1px solid rgba(0,180,255,.3);
box-shadow:0 0 40px rgba(0,180,255,.2);
}

.logo-area{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.logo-area img{
height:120px;
filter: drop-shadow(0 0 15px #00b4ff);
}

h1{
font-size:32px;
color:#7dd3fc;
}

.status-geral{
font-size:22px;
color:#38bdf8;
font-weight:bold;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

/* CARDS */

.card{
background:#0b1220;
border-radius:16px;
padding:30px;
text-align:center;
border:1px solid rgba(0,180,255,.25);
box-shadow:0 0 25px rgba(0,180,255,.2);
}

.card h2{
font-size:24px;
}

/* STATUS */

.disponivel{
border-color:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.4);
}

.instavel{
border-color:#facc15;
}

.indisponivel{
border-color:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.7);
animation:piscando 1s infinite;
}

@keyframes piscando{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}

/* MAPA */

#mapa{
height:420px;
margin:40px;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(0,180,255,.25);
}

/* GRÁFICO */

.grafico-area{
padding:40px;
}

canvas{
background:#0b1220;
border-radius:16px;
padding:20px;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#050d1a;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<div class="logo-area">
<img src="{{ url_for('static', filename='Governo Digital.png') }}">
<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>
</div>

<div class="status-geral">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<div id="mapa"></div>

<div class="grafico-area">
<h2 style="color:#7dd3fc;">Tempo médio de resposta</h2>
<canvas id="graficoTempo"></canvas>
</div>

<footer>
Centro de Monitoramento Digital • Governo Digital
</footer>

<audio id="alertaSom">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-alert-alarm-1005.mp3">
</audio>

<script>

/* MAPA GOIÁS */

const mapa = L.map('mapa', {
zoomControl:false,
minZoom:7,
maxZoom:10
}).setView([-15.5,-49.5],7)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa)

/* LIMITAR VISUALIZAÇÃO EM GOIÁS */

const bounds = [
[-18.5,-53],
[-12.5,-45]
]

mapa.setMaxBounds(bounds)

/* CIDADES MONITORADAS */

const cidades = {

"Valparaíso": [-16.065,-47.975],
"Cidade Ocidental": [-16.076,-47.925],
"Luziânia": [-16.252,-47.950],
"São João d'Aliança": [-14.705,-47.522],
"Alto Paraíso": [-14.130,-47.510],
"Simolândia": [-14.464,-46.484],
"Terezópolis": [-16.394,-48.948]

}

let marcadores={}

/* GRÁFICO */

let historicoTempo=[]
let historicoHora=[]

const ctx=document.getElementById('graficoTempo')

const grafico=new Chart(ctx,{
type:'line',
data:{
labels:historicoHora,
datasets:[{
label:'Tempo médio (ms)',
data:historicoTempo,
borderColor:'#00b4ff',
backgroundColor:'rgba(0,180,255,.2)',
tension:0.4
}]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}
}
})

async function carregar(){

const resposta=await fetch("/dados")
const dados=await resposta.json()

document.getElementById("percentual").innerText=dados.percentual+"%"

const grid=document.getElementById("grid")
grid.innerHTML=""

let soma=0
let alerta=false

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"

if(p.status=="INDISPONÍVEL" || p.status=="FORA DO AR"){
classe="indisponivel"
alerta=true
}

soma+=p.tempo

grid.innerHTML+=`

<div class="card ${classe}">
<h2>${p.nome}</h2>
<div>${p.status}</div>
<div>Tempo: ${p.tempo} ms</div>
</div>

`

/* MARCADORES NO MAPA */

if(cidades[p.nome]){

let cor="green"

if(p.status=="INSTÁVEL") cor="yellow"
if(p.status=="INDISPONÍVEL" || p.status=="FORA DO AR") cor="red"

if(marcadores[p.nome]){

marcadores[p.nome].setStyle({color:cor})

}else{

marcadores[p.nome]=L.circleMarker(cidades[p.nome],{
radius:8,
color:cor
}).addTo(mapa)

}

}

})

if(alerta){
document.getElementById("alertaSom").play()
}

let media=Math.round(soma/dados.portais.length)

historicoTempo.push(media)
historicoHora.push(new Date().toLocaleTimeString())

if(historicoTempo.length>20){
historicoTempo.shift()
historicoHora.shift()
}

grafico.update()

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
