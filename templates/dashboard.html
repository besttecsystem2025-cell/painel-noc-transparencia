<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel NOC</title>
<style>
body{
    margin:0;
    background:#020617;
    color:#00ff88;
    font-family:Arial;
    text-align:center;
}
h1{margin-top:30px;}
.card{
    background:#0f172a;
    margin:15px auto;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:400px;
    box-shadow:0 0 15px #00ff88;
}
</style>
</head>

<body>

<h1>Monitoramento de Portais</h1>

<div id="dados"></div>

<script>
function carregar(){
    fetch('/dados')
    .then(r=>r.json())
    .then(data=>{
        let html="";
        for(let nome in data){
            let d = data[nome];
            html += `
            <div class="card">
                <h3>${nome}</h3>
                <p>${d.status}</p>
                <p>${d.tempo} ms</p>
            </div>`;
        }
        document.getElementById("dados").innerHTML = html;
    });
}

carregar();
setInterval(carregar, 10000);
</script>

</body>
</html>
