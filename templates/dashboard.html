<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
background:#050d1a;
padding:25px 40px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(0,180,255,.3);
box-shadow:0 0 40px rgba(0,180,255,.2);
}

.logo-area{
display:flex;
align-items:center;
gap:25px;
}

.logo-area img{
height:130px;
filter: drop-shadow(0 0 15px #00b4ff);
}

h1{
font-size:30px;
margin:0;
color:#7dd3fc;
letter-spacing:1px;
}

/* STATUS */

.status-geral{
font-size:24px;
color:#38bdf8;
font-weight:bold;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px;
}

/* CARDS */

.card{
background:#0b1220;
border-radius:16px;
padding:30px;
text-align:center;
border:1px solid rgba(0,180,255,.25);
box-shadow:0 0 25px rgba(0,180,255,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 35px rgba(0,180,255,.5);
}

.card h2{
font-size:28px;
margin-bottom:10px;
}

/* STATUS */

.disponivel{
border-color:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.4);
}

.instavel{
border-color:#facc15;
box-shadow:0 0 20px rgba(250,204,21,.4);
}

.indisponivel{
border-color:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.6);
animation:pulse 1.6s infinite;
}

.status{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.tempo{
font-size:18px;
opacity:.8;
}

/* GRÁFICO */

.grafico-area{
padding:40px;
}

canvas{
background:#0b1220;
border-radius:16px;
padding:20px;
border:1px solid rgba(0,180,255,.25);
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#050d1a;
font-size:14px;
color:#94a3b8;
}

/* ALERTA */

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.03)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<header>

<div class="logo-area">

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

</div>

<div class="status-geral">
Disponibilidade Geral:
<span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<div class="grafico-area">

<h2 style="color:#7dd3fc;">Tempo médio de resposta</h2>

<canvas id="graficoTempo"></canvas>

</div>

<footer>
Centro de Monitoramento Digital • Governo Digital
</footer>

<script>

let historicoTempo = []
let historicoHora = []

const ctx = document.getElementById('graficoTempo')

const grafico = new Chart(ctx, {
type: 'line',
data: {
labels: historicoHora,
datasets: [{
label: 'Tempo médio (ms)',
data: historicoTempo,
borderColor: '#00b4ff',
backgroundColor: 'rgba(0,180,255,.2)',
tension:0.3
}]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}
}
})

async function carregar(){

const resposta = await fetch("/dados")
const dados = await resposta.json()

const grid = document.getElementById("grid")
grid.innerHTML=""

document.getElementById("percentual").innerText = dados.percentual + "%"

let somaTempo = 0

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"
if(p.status=="INDISPONÍVEL") classe="indisponivel"

somaTempo += p.tempo

grid.innerHTML+=`

<div class="card ${classe}">
<h2>${p.nome}</h2>
<div class="status">${p.status}</div>
<div class="tempo">Tempo: ${p.tempo} ms</div>
</div>

`

})

let media = Math.round(somaTempo / dados.portais.length)

let agora = new Date().toLocaleTimeString()

historicoTempo.push(media)
historicoHora.push(agora)

if(historicoTempo.length > 20){
historicoTempo.shift()
historicoHora.shift()
}

grafico.update()

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
