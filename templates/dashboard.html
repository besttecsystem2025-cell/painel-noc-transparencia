<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monitoramento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100vh;
overflow:hidden;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:10px;
height:140px;
}

header img{
height:60px;
filter:drop-shadow(0 0 10px #00b4ff);
}

h1{
margin-top:8px;
font-size:26px;
color:#7dd3fc;
}

.status{
color:#38bdf8;
margin-top:5px;
}

/* LAYOUT */

.container{

display:grid;
grid-template-columns:380px 1fr;
gap:30px;
height:calc(100vh - 140px);
max-width:1300px;
margin:auto;
align-items:center;

}

/* MAPA */

.mapa{

width:100%;
max-width:380px;
margin:auto;

}

.mapa img{

width:100%;
height:auto;

}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
height:100%;
align-content:center;

}

/* CARD */

.card{

background:#0b1220;
border-radius:12px;
padding:18px;
text-align:center;
border:1px solid rgba(0,180,255,.4);
box-shadow:0 0 12px rgba(0,180,255,.5);
display:flex;
flex-direction:column;
justify-content:center;
gap:8px;

}

/* RADAR */

.radar{

width:12px;
height:12px;
background:#22c55e;
border-radius:50%;
margin:auto;
position:relative;

}

.radar::after{

content:'';
position:absolute;
width:20px;
height:20px;
border-radius:50%;
border:2px solid #22c55e;
top:-4px;
left:-4px;
animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(.5);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

.card strong{
font-size:15px;
}

/* TABLET */

@media(max-width:1000px){

.container{

grid-template-columns:1fr;
grid-template-rows:auto 1fr;

}

.cards{

grid-template-columns:repeat(2,1fr);

}

.mapa{

max-width:320px;

}

}

/* CELULAR */

@media(max-width:600px){

.cards{

grid-template-columns:1fr;

}

.mapa{

max-width:240px;

}

h1{
font-size:20px;
}

}

</style>

</head>


<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">100%</span>
</div>

</header>


<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

</div>


<div class="cards" id="grid"></div>

</div>


<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<div class="radar"></div>

<strong>${nomes[p.nome]}</strong>

${p.status}

${p.tempo} ms

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>


</body>

</html>
