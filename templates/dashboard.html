<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento Transparência</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
overflow-x:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:20px 10px;
}

header img{
height:60px;
margin-bottom:10px;
filter:drop-shadow(0 0 10px #00bfff);
}

h1{
color:#7dd3fc;
font-size:28px;
}

.status{
color:#38bdf8;
margin-top:5px;
font-size:16px;
}

/* LAYOUT */

.container{

max-width:1300px;
width:100%;

margin:auto;

display:flex;
flex-direction:column;

align-items:center;
gap:30px;

padding:20px;

}

/* MAPA */

.mapa{

width:100%;
max-width:420px;

}

.mapa img{
width:100%;
height:auto;
}

/* CARDS */

.cards{

width:100%;

display:grid;
grid-template-columns:1fr;

gap:20px;

}

/* CARD */

.card{

background:#0b1220;

border-radius:12px;

padding:25px;

text-align:center;

border:1px solid rgba(0,180,255,.4);

box-shadow:0 0 15px rgba(0,180,255,.4);

display:flex;
flex-direction:column;
align-items:center;

gap:10px;

}

/* RADAR */

.radar{

width:14px;
height:14px;

background:#22c55e;

border-radius:50%;

position:relative;

}

.radar::after{

content:'';

position:absolute;

width:24px;
height:24px;

border-radius:50%;

border:2px solid #22c55e;

top:-5px;
left:-5px;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:scale(.6);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

.card strong{
font-size:16px;
}

.card span{
font-size:18px;
}

/* TABLET */

@media(min-width:700px){

.cards{
grid-template-columns:repeat(2,1fr);
}

.mapa{
max-width:450px;
}

}

/* NOTEBOOK */

@media(min-width:1000px){

.container{

flex-direction:row;

align-items:flex-start;

justify-content:center;

}

.mapa{

flex:1;

max-width:500px;

}

.cards{

flex:2;

grid-template-columns:repeat(3,1fr);

}

}

/* TV / TELAS GRANDES */

@media(min-width:1600px){

h1{
font-size:34px;
}

.cards{

grid-template-columns:repeat(4,1fr);

}

}

</style>

</head>


<body>


<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">
Disponibilidade Geral: <span id="percentual">100%</span>
</div>

</header>


<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

</div>


<div class="cards" id="grid"></div>

</div>


<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",

"Valparaíso":"Câmara Municipal de Valparaíso",

"São João d'Aliança":"Câmara Municipal de São João d'Aliança",

"Alto Paraíso":"Câmara Municipal de Alto Paraíso",

"Luziânia":"Câmara Municipal de Luziânia",

"Simolândia":"Prefeitura de Simolândia",

"Terezópolis":"Prefeitura de Terezópolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

grid.innerHTML += `

<div class="card">

<div class="radar"></div>

<strong>${nomes[p.nome]}</strong>

<span>${p.status}</span>

<span>${p.tempo} ms</span>

</div>

`

})

}

carregar()

setInterval(carregar,30000)

</script>


</body>

</html>
