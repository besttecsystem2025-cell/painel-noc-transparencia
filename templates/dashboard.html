<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
overflow:hidden;
height:100vh;

}

/* HEADER */

header{

text-align:center;
padding:10px;

}

header img{

height:100px;
filter:drop-shadow(0 0 20px #00b4ff);

}

h1{

margin:5px 0;
color:#7dd3fc;
font-size:28px;

}

.status{

color:#38bdf8;
font-size:16px;

}

/* LAYOUT */

.container{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

height:calc(100vh - 120px);

padding:10px;

}

/* MAPA */

.mapa{

position:relative;

display:flex;
justify-content:center;
align-items:flex-start;

}

.mapa img{

width:80%;
max-width:420px;

}

/* MASCARA DAS CIDADES */

.cidade{

position:absolute;

width:70px;
height:70px;

animation:pulse 2s infinite;

opacity:.45;

}

/* FORMATO DAS CIDADES */

#cidadeocidental{

top:58%;
left:34%;

clip-path:polygon(
20% 10%,80% 10%,90% 40%,70% 80%,30% 80%,10% 40%
);

}

#valparaiso{

top:55%;
left:40%;

clip-path:polygon(
25% 15%,75% 15%,85% 45%,65% 80%,35% 80%,15% 45%
);

}

#luziania{

top:48%;
left:55%;

clip-path:polygon(
20% 20%,80% 10%,90% 50%,70% 85%,30% 85%,10% 50%
);

}

#saojoao{

top:35%;
left:60%;

clip-path:polygon(
30% 10%,70% 10%,90% 40%,60% 90%,20% 80%,10% 40%
);

}

#altoparaiso{

top:22%;
left:45%;

clip-path:polygon(
30% 20%,70% 10%,90% 40%,70% 80%,30% 80%,10% 40%
);

}

#simolandia{

top:58%;
left:68%;

clip-path:polygon(
20% 20%,80% 20%,90% 50%,70% 80%,30% 80%,10% 50%
);

}

#terezopolis{

top:70%;
left:50%;

clip-path:polygon(
30% 20%,70% 20%,90% 50%,60% 85%,40% 85%,10% 50%
);

}

/* STATUS */

.disponivel{

background:#22c55e;

}

.instavel{

background:#facc15;

}

.indisponivel{

background:#ef4444;

}

/* ANIMAÇÃO */

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}

}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

align-content:start;

}

/* CARD */

.card{

background:#0b1220;

border-radius:12px;

padding:15px;

text-align:center;

border:1px solid rgba(0,180,255,.3);

box-shadow:0 0 20px rgba(0,180,255,.2);

animation:glow 4s infinite alternate;

}

@keyframes glow{

from{box-shadow:0 0 10px rgba(0,180,255,.2)}
to{box-shadow:0 0 25px rgba(0,180,255,.6)}

}

.card:hover{

transform:scale(1.05);

}

/* RESPONSIVO */

@media (max-width:1200px){

.container{

grid-template-columns:1fr;
overflow:auto;

}

body{

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status">

Disponibilidade Geral: <span id="percentual">0%</span>

</div>

</header>

<div class="container">

<div class="mapa">

<img src="{{ url_for('static', filename='mapa-goias.png') }}">

<div id="cidadeocidental" class="cidade"></div>
<div id="valparaiso" class="cidade"></div>
<div id="luziania" class="cidade"></div>
<div id="saojoao" class="cidade"></div>
<div id="altoparaiso" class="cidade"></div>
<div id="simolandia" class="cidade"></div>
<div id="terezopolis" class="cidade"></div>

</div>

<div class="cards" id="grid"></div>

</div>

<script>

const nomes = {

"Cidade Ocidental":"Câmara Municipal de Cidade Ocidental",
"Valparaíso":"Câmara Municipal de Valparaíso",
"São João d'Aliança":"Câmara Municipal de São João d'Aliança",
"Alto Paraíso":"Câmara Municipal de Alto Paraíso",
"Luziânia":"Câmara Municipal de Luziânia",
"Simolândia":"Prefeitura de Simolândia",
"Terezópolis":"Prefeitura de Terezópolis"

}

const idsMapa = {

"Cidade Ocidental":"cidadeocidental",
"Valparaíso":"valparaiso",
"São João d'Aliança":"saojoao",
"Alto Paraíso":"altoparaiso",
"Luziânia":"luziania",
"Simolândia":"simolandia",
"Terezópolis":"terezopolis"

}

async function carregar(){

const resposta = await fetch("/dados")

const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")

grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL")classe="instavel"
if(p.status=="INDISPONÍVEL")classe="indisponivel"

let nomeCompleto = nomes[p.nome]

grid.innerHTML+=`

<div class="card">

<strong>${nomeCompleto}</strong>

<br><br>

${p.status}

<br>

${p.tempo} ms

</div>

`

let id = idsMapa[p.nome]

let cidade = document.getElementById(id)

cidade.classList.remove("disponivel","instavel","indisponivel")

cidade.classList.add(classe)

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>

</html>
