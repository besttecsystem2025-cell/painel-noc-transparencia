<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Centro de Monitoramento - Governo Digital</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#020617;
color:white;
}

header{
background:#050d1a;
padding:30px;
text-align:center;
border-bottom:1px solid rgba(0,180,255,.3);
box-shadow:0 0 40px rgba(0,180,255,.2);
}

header img{
height:120px;
filter:drop-shadow(0 0 15px #00b4ff);
}

h1{
color:#7dd3fc;
margin-top:10px;
}

.status-geral{
font-size:20px;
color:#38bdf8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#0b1220;
border-radius:16px;
padding:30px;
text-align:center;
border:1px solid rgba(0,180,255,.25);
box-shadow:0 0 25px rgba(0,180,255,.2);
}

.disponivel{
border-color:#22c55e;
}

.instavel{
border-color:#facc15;
}

.indisponivel{
border-color:#ef4444;
}

.ranking-area{
padding:40px;
}

.ranking-area h2{
color:#7dd3fc;
margin-bottom:20px;
}

.ranking-item{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.1);
font-size:18px;
}

footer{
text-align:center;
padding:10px;
background:#050d1a;
color:#94a3b8;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<img src="{{ url_for('static', filename='Governo Digital.png') }}">

<h1>MONITORAMENTO DOS PORTAIS DE TRANSPARÊNCIA</h1>

<div class="status-geral">
Disponibilidade Geral: <span id="percentual">0%</span>
</div>

</header>

<div class="grid" id="grid"></div>

<div class="ranking-area">

<h2>Ranking de desempenho dos portais</h2>

<div id="ranking"></div>

</div>

<footer>
Centro de Monitoramento Digital • Governo Digital
</footer>

<script>

async function carregar(){

const resposta = await fetch("/dados")
const dados = await resposta.json()

document.getElementById("percentual").innerText = dados.percentual + "%"

const grid = document.getElementById("grid")
grid.innerHTML=""

dados.portais.forEach(p=>{

let classe="disponivel"

if(p.status=="INSTÁVEL") classe="instavel"
if(p.status=="INDISPONÍVEL") classe="indisponivel"

grid.innerHTML += `
<div class="card ${classe}">
<h2>${p.nome}</h2>
<div>${p.status}</div>
<div>Tempo: ${p.tempo} ms</div>
</div>
`

})

/* RANKING */

const ranking = document.getElementById("ranking")

const ordenado = [...dados.portais].sort((a,b)=>a.tempo-b.tempo)

ranking.innerHTML=""

ordenado.forEach((p,i)=>{

ranking.innerHTML += `
<div class="ranking-item">
${i+1}º — ${p.nome} : ${p.tempo} ms
</div>
`

})

}

carregar()

setInterval(carregar,30000)

</script>

</body>
</html>
